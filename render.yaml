services:
  - type: web
    name: edutrack
    runtime: node
    buildCommand: pnpm install --no-frozen-lockfile && pnpm -r --if-present run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SKIP_INSTALL_DEPENDENCIES
        value: true
      - key: PNPM_VERSION
        value: 10.4.1
